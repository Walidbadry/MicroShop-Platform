<!DOCTYPE html>
<html>
<head>
<title>MicroShop</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:40px}
.navbar{display:flex;justify-content:space-between;background:#1f2937;color:white;padding:15px 30px}
.navbar button{background:crimson;color:white;border:none;padding:8px 15px;cursor:pointer}
.auth-box{width:350px;margin:80px auto;background:white;padding:30px;border-radius:8px;box-shadow:0 0 20px rgba(0,0,0,0.1)}
.auth-box input{width:100%;padding:10px;margin:10px 0}
.auth-box button{width:100%;padding:10px;background:#2563eb;color:white;border:none}
.home{text-align:center;margin-top:100px}
</style>
</head>
<body>
<div class="navbar">
<h2>MicroShop</h2>
<button onclick="logout()">Logout</button>
</div>
<div class="auth-box" id="auth-box">
<h2>Login</h2>
<input id="email" value="admin@test.com">
<input id="password" type="password" value="123456">
<button onclick="login()">Login</button>
</div>
<div class="home" id="home" style="display:none">
<h1>Welcome to MicroShop 🚀</h1>
<p>You are logged in successfully.</p>
<input id="product" placeholder="Add Product">
<button onclick="add()">Add Order</button>
<ul id="orders"></ul>
</div>
<script>
let token=null;
async function login(){
 const res=await fetch("http://localhost:8080/api/users/auth/login",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({email:email.value,password:password.value})
 });
 const data=await res.json();
 token=data.token;
 document.getElementById('auth-box').style.display='none';
 document.getElementById('home').style.display='block';
 load();
}
function logout(){localStorage.removeItem("token");location.reload();}
async function load(){
 const res=await fetch("http://localhost:8080/api/orders/orders",{
   headers:{Authorization:"Bearer "+token}
 });
 const data=await res.json();
 const orders=document.getElementById('orders');
 orders.innerHTML="";
 data.forEach(o=>{const li=document.createElement('li');li.textContent=o.product;orders.appendChild(li);});
}
async function add(){
 const prod=document.getElementById('product').value;
 await fetch("http://localhost:8080/api/orders/orders",{
   method:"POST",
   headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
   body:JSON.stringify({product:prod})
 });
 load();
}
</script>
</body>
</html>
